name: Test Project

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      
      - name: Checkout code
        uses: actions/checkout@v4

      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
      - name: Run migrations
        run: npm run migrate
        env:
          DATABASE_URL: postgres://testuser:testpassword@localhost:5432/testdb 
      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgres://testuser:testpassword@localhost:5432/testdb
          NODE_ENV: test
          PORT: 3000

      - name: Build project
        run: npm run build
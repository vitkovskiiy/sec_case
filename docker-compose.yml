version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: github_notifier_db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: notifier_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notifier_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: github_notifier_app
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npm run migrate && npm run dev"
volumes:
  pgdata: